services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    restart: unless-stopped
    depends_on:
      - app
    expose:
      - "80"
    volumes:
      - app_storage:/var/www/html/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/up | grep -q ok || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_RUNTIME_ROLE: app
      APP_RUN_STORAGE_LINK: "true"
      APP_RUN_PACKAGE_DISCOVER: "true"
      APP_RUN_OPTIMIZE: ${APP_RUN_OPTIMIZE:-true}
      APP_RUN_MIGRATIONS: ${APP_RUN_MIGRATIONS:-false}
      CACHE_STORE: ${CACHE_STORE:-file}
      SESSION_DRIVER: ${SESSION_DRIVER:-file}
      STATUS_SNAPSHOT_CACHE_STORE: ${STATUS_SNAPSHOT_CACHE_STORE:-file}
      STATUS_SNAPSHOT_CACHE_SECONDS: ${STATUS_SNAPSHOT_CACHE_SECONDS:-15}
    expose:
      - "9000"
    volumes:
      - app_storage:/var/www/html/storage
    healthcheck:
      test: ["CMD-SHELL", "SCRIPT_NAME=/fpm-ping SCRIPT_FILENAME=/fpm-ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000 | grep -q pong || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s

  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    restart: unless-stopped
    depends_on:
      - app
    env_file:
      - .env
    environment:
      APP_RUNTIME_ROLE: queue
      APP_RUN_STORAGE_LINK: "false"
      APP_RUN_PACKAGE_DISCOVER: "false"
      APP_RUN_OPTIMIZE: "false"
      APP_RUN_MIGRATIONS: "false"
      CACHE_STORE: ${CACHE_STORE:-file}
      SESSION_DRIVER: ${SESSION_DRIVER:-file}
      STATUS_SNAPSHOT_CACHE_STORE: ${STATUS_SNAPSHOT_CACHE_STORE:-file}
      STATUS_SNAPSHOT_CACHE_SECONDS: ${STATUS_SNAPSHOT_CACHE_SECONDS:-15}
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=1", "--timeout=90"]
    volumes:
      - app_storage:/var/www/html/storage

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    restart: unless-stopped
    depends_on:
      - app
    env_file:
      - .env
    environment:
      APP_RUNTIME_ROLE: scheduler
      APP_RUN_STORAGE_LINK: "false"
      APP_RUN_PACKAGE_DISCOVER: "false"
      APP_RUN_OPTIMIZE: "false"
      APP_RUN_MIGRATIONS: "false"
      CACHE_STORE: ${CACHE_STORE:-file}
      SESSION_DRIVER: ${SESSION_DRIVER:-file}
      STATUS_SNAPSHOT_CACHE_STORE: ${STATUS_SNAPSHOT_CACHE_STORE:-file}
      STATUS_SNAPSHOT_CACHE_SECONDS: ${STATUS_SNAPSHOT_CACHE_SECONDS:-15}
    command:
      - sh
      - -lc
      - while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done
    volumes:
      - app_storage:/var/www/html/storage

volumes:
  app_storage:
